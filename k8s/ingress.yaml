apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signbell-ingress
  namespace: default
  annotations:
    # --- 필수 Annotations ---
    alb.ingress.kubernetes.io/scheme: internet-facing  # 외부 공개용 ALB
    alb.ingress.kubernetes.io/target-type: ip          # Pod IP 직접 타겟팅 (권장)
    
    # --- 리스너 및 SSL/TLS ---
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # ⚠️ 실제 ACM 인증서 ARN으로 교체 필요
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:801490935747:certificate/408f25cf-0c25-4154-a5fd-37515321edbb
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06  # 최신 TLS 정책
    
    # --- HTTP -> HTTPS 리다이렉트 ---
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {
        "Type": "redirect",
        "RedirectConfig": {
          "Protocol": "HTTPS",
          "Port": "443",
          "StatusCode": "HTTP_301"
        }
      }
    
    # --- WebSocket 및 WebRTC 지원 설정 ---
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/connection-idle-timeout: "3600"  # WebSocket 연결 유지 (1시간)
    
    # --- 타겟 그룹 속성 (WebSocket/WebRTC 스티키 세션 + OAuth2 플로우 유지) ---
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=86400,deregistration_delay.timeout_seconds=30
    
    # --- 헬스 체크 설정 ---
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # --- 태그 (선택사항) ---
    alb.ingress.kubernetes.io/tags: Environment=production,Project=signbell

spec:
  ingressClassName: alb
  rules:
  # --- Backend API Routing (api.signbell.app) ---
  - host: api.signbell.store
    http:
      paths:
      # HTTP -> HTTPS 리다이렉트
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ssl-redirect
            port:
              name: use-annotation
      
      # HTTPS 트래픽은 백엔드 서비스로 라우팅
      - path: /
        pathType: Prefix
        backend:
          service:
            name: signbell-backend-service
            port:
              number: 80
  
  # --- AI Server Routing (ai.signbell.app) ---
  - host: ai.signbell.store
    http:
      paths:
      # HTTP -> HTTPS 리다이렉트
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ssl-redirect
            port:
              name: use-annotation
      
      # HTTPS 트래픽은 AI 서비스로 라우팅 (WebSocket 포함)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: signbell-ai-service
            port:
              number: 80
