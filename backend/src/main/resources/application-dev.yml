server:
  port: ${SERVER_PORT}
  # [필수] SSL 설정 추가 - 톰캣이 HTTPS 요청을 처리하도록 지시
  ssl:
    enabled: true
    key-store: "classpath:keystore.p12"
    key-store-password: "mariadb"   # 실제 비밀번호로 변경하거나 ENV 사용
    key-alias: signbell-alias
    key-store-type: PKCS12

spring:
  # database setting
  datasource:
    url: jdbc:mariadb://localhost:3306/signbell
    username: root
    password: mariadb
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    defer-datasource-initialization: true

    # DBMS dialect setting
    database-platform: org.hibernate.dialect.MariaDB106Dialect
    hibernate:
      # ddl
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true # SQL log

  # OAuth2 setting
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: [ profile_nickname, profile_image ]
            # 카카오로그인 - 일반 - 리다이렉트 URI
            redirect-uri: 'https://localhost:8443/login/oauth2/code/kakao'
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

logging:
  level:
    app.signbell.backend: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

cookie:
  domain: localhost
  secure: ${COOKIE_SECURE:true}  # 환경변수로 제어 가능하도록 설정
  http-only: true
  same-site: ${COOKIE_SAME_SITE:Lax}  # 환경변수로 제어 가능하도록 설정
  access-token-name: ACCESS_TOKEN
  refresh-token-name: REFRESH_TOKEN
  access-max-age: ${COOKIE_ACCESS_TOKEN_MAX_AGE}
  refresh-max-age: ${COOKIE_REFRESH_TOKEN_MAX_AGE}

app:
  # OAuth2 로그인 성공 프론트 리다이렉트 url
  oauth2-success-redirect-url: ${APP_OAUTH2_SUCCESS_REDIRECT_URL}
  # OAuth2 로그인 실패 프론트 리다이렉트 url
  oauth2-failure-redirect-url: ${APP_OAUTH2_FAILURE_REDIRECT_URL}

# 국어원 API
api:
  serviceKey: "${API_SERVICE_KEY}"  # ? API_SERVICE_KEY ?? ?? ??
  requestUrl: "${API_REQUEST_URL}" # ? API_REQUEST_URL ?? ?? ??