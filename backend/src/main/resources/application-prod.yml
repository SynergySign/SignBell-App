server:
  port: ${PORT}
  # HTTPS 강제 설정 (프록시 뒤에서 실행되는 경우)
  forward-headers-strategy: framework
  # 보안 헤더 설정
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: none
        domain: signbell.app  # 서브도메인 간 세션 쿠키 공유 (점 제거)

spring:
  # database setting
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    # HikariCP 커넥션 풀 설정 (RDS Free Tier 최적화)
    hikari:
      maximum-pool-size: 5          # Pod당 최대 5개 연결 (2 Pod = 10개)
      minimum-idle: 2               # 최소 유휴 연결 2개
      connection-timeout: 20000     # 연결 타임아웃 20초
      idle-timeout: 300000          # 유휴 연결 5분 후 제거
      max-lifetime: 1200000         # 연결 최대 수명 20분
      connection-test-query: SELECT 1  # 연결 테스트 쿼리

  jpa:
    hibernate:
      # 엔티티와 DB 스키마가 일치하는지만 검증
      # 테이블을 생성하거나 수정 x
      ddl-auto: none
    # SQL 쿼리를 콘솔에 출력 x
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  # OAuth2 setting
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: fe6e66d4503ac3500dc492d135d842ff
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: [ profile_nickname, profile_image ]
            # Spring Security OAuth2 기본 경로 사용: /login/oauth2/code/kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

logging:
  level:
    app.signbell.backend: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.hibernate.SQL: WARN

cookie:
  domain: ${COOKIE_DOMAIN}
  secure: true     # HTTPS에서만 쿠키 전송
  http-only: true  # XSS 방어
  same-site: None  # 크로스 도메인 허용
  access-token-name: ACCESS_TOKEN
  refresh-token-name: REFRESH_TOKEN
  access-max-age: ${COOKIE_ACCESS_TOKEN_MAX_AGE}
  refresh-max-age: ${COOKIE_REFRESH_TOKEN_MAX_AGE}

app:
  # OAuth2 로그인 성공 프론트 리다이렉트 url
  oauth2-success-redirect-url: ${APP_OAUTH2_SUCCESS_REDIRECT_URL}
  # OAuth2 로그인 실패 프론트 리다이렉트 url
  oauth2-failure-redirect-url: ${APP_OAUTH2_FAILURE_REDIRECT_URL}
  # CORS 및 WebSocket에 허용할 배포용 오리진 url
  frontend-origin-url: ${FRONTEND_ORIGIN}
  backend-origin-url: ${BACKEND_ORIGIN}

# 국어원 API
api:
  serviceKey: "${API_SERVICE_KEY}"  # ? API_SERVICE_KEY
  requestUrl: "${API_REQUEST_URL}" # ? API_REQUEST_URL